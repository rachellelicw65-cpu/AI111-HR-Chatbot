<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Preface HR Assistant Chatbot</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background-color: #f5f7fa;
    }

    #chat-container {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      background-color: #004aad;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.2rem;
      font-weight: bold;
    }

    n8n-chat {
      flex: 1;
      border: none;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div class="chat-header">Preface HR Assistant</div>
    <!-- The actual chat widget -->
    <n8n-chat></n8n-chat>
  </div>

  <!-- Load the n8n chat web component -->
  <script type="module">
    import "@n8n/chat";

    // Configure the chat widget
    const chatEl = document.querySelector("n8n-chat");
    chatEl.apiUrl = 'https://ciwali65.app.n8n.cloud/webhook/1134224f-6393-4832-a202-598f98c69dd9/chat'; // replace later
    chatEl.enableStreaming = false; // required
    chatEl.botName = "HR Assistant";
    chatEl.botAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    chatEl.userAvatar = "https://cdn-icons-png.flaticon.com/512/847/847969.png";
    chatEl.placeholder = "Ask me about HR policies...";
    chatEl.theme = {
      primaryColor: "#004aad",
      secondaryColor: "#f5f7fa",
      textColor: "#333333",
      userMessageColor: "#e1f0ff",
      botMessageColor: "#ffffff",
    };
    chatEl.defaultOpen = true;
    chatEl.showHeader = false;
    chatEl.showFooter = true;
    chatEl.allowFileUpload = false;
  </script>
</body>
</html>
